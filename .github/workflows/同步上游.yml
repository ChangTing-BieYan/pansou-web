name: 同步上游（保留前端修改）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/fish2018/pansou-web.git || true
          git fetch upstream main

      - name: 检查上游是否有新提交
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse FETCH_HEAD)
          echo "LOCAL=$LOCAL"
          echo "UPSTREAM=$UPSTREAM"

          if git merge-base --is-ancestor $UPSTREAM $LOCAL; then
            echo "✅ 无需同步"
            exit 0
          else
            echo "🔄 检测到上游更新"
          fi

      - name: 保存本地修改
        run: |
          mkdir -p /tmp/mychanges
          cp Dockerfile /tmp/mychanges/ 2>/dev/null || true
          cp docker-compose.yml /tmp/mychanges/ 2>/dev/null || true
          cp build-docker.yml /tmp/mychanges/ 2>/dev/null || true

      - name: 合并上游
        run: |
          git checkout main
          git merge upstream/main --no-edit || true

      # ❗关键：不允许上游覆盖你的 workflow
      - name: 恢复本地 workflow（防止权限报错）
        run: |
          git checkout HEAD -- .github/workflows || true

      - name: 保留 CHANNELS / ENABLED_PLUGINS
        run: |
          echo "处理 docker-compose.yml"

          if [ -f docker-compose.yml ] && [ -f /tmp/mychanges/docker-compose.yml ]; then
            LOCAL_CHANNELS=$(grep -E '^\s*- CHANNELS=' /tmp/mychanges/docker-compose.yml || true)
            LOCAL_PLUGINS=$(grep -E '^\s*- ENABLED_PLUGINS=' /tmp/mychanges/docker-compose.yml || true)

            grep -v -E '^\s*- (CHANNELS|ENABLED_PLUGINS)=' docker-compose.yml > /tmp/up.yml
            grep -v -E '^\s*- (CHANNELS|ENABLED_PLUGINS)=' /tmp/mychanges/docker-compose.yml > /tmp/local.yml

            if cmp -s /tmp/up.yml /tmp/local.yml; then
              cp /tmp/mychanges/docker-compose.yml docker-compose.yml
            else
              [ -n "$LOCAL_CHANNELS" ] && sed -i "/- CHANNELS=/c\\$LOCAL_CHANNELS" docker-compose.yml
              [ -n "$LOCAL_PLUGINS" ] && sed -i "/- ENABLED_PLUGINS=/c\\$LOCAL_PLUGINS" docker-compose.yml
            fi
          fi

          echo "处理 Dockerfile"

          if [ -f Dockerfile ] && [ -f /tmp/mychanges/Dockerfile ]; then
            LOCAL_CHANNELS=$(grep '^ENV CHANNELS=' /tmp/mychanges/Dockerfile || true)
            LOCAL_PLUGINS=$(grep '^ENV ENABLED_PLUGINS=' /tmp/mychanges/Dockerfile || true)

            grep -v -E '^ENV (CHANNELS|ENABLED_PLUGINS)=' Dockerfile > /tmp/up_docker
            grep -v -E '^ENV (CHANNELS|ENABLED_PLUGINS)=' /tmp/mychanges/Dockerfile > /tmp/local_docker

            if cmp -s /tmp/up_docker /tmp/local_docker; then
              cp /tmp/mychanges/Dockerfile Dockerfile
            else
              [ -n "$LOCAL_CHANNELS" ] && sed -i "/^ENV CHANNELS=/c\\$LOCAL_CHANNELS" Dockerfile
              [ -n "$LOCAL_PLUGINS" ] && sed -i "/^ENV ENABLED_PLUGINS=/c\\$LOCAL_PLUGINS" Dockerfile
            fi
          fi

      - name: 恢复其他本地文件
        run: |
          cp /tmp/mychanges/build-docker.yml ./ 2>/dev/null || true

      - name: 提交并推送
        run: |
          git add .

          # ❗核心：彻底禁止 workflow 被提交
          git reset HEAD .github/workflows || true
          git checkout -- .github/workflows || true

          git diff --cached --quiet || git commit -m "🔄 同步上游"
          git push origin main
